{% extends 'SELLER/commen.html' %}
{% load static %}

{% block content %}

<section class="banner-area organic-breadcrumb">
    <div class="container">
        <h1>Edit Product</h1>
    </div>
</section>

<div class="container mt-3">
    {% for m in messages %}
    <div class="alert alert-info text-center">{{ m }}</div>
    {% endfor %}
</div>

<section class="contact_area section_gap_bottom">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow p-4">

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <input type="text" name="product_name"
                               class="form-control mb-3"
                               value="{{ product.product_name }}" required>

                        <select name="category" class="form-control mb-3" required>
                            {% for c in categories %}
                            <option value="{{ c.id }}"
                                {% if c.id == product.category.id %}selected{% endif %}>
                                {{ c.category_name }}
                            </option>
                            {% endfor %}
                        </select>

                        <input type="text" name="brand"
                               class="form-control mb-3"
                               value="{{ product.brand }}" required>

                        <input type="number" name="size"
                               class="form-control mb-3"
                               value="{{ product.size }}" required>

                        <input type="text" name="color"
                               class="form-control mb-3"
                               value="{{ product.color }}" required>

                        <input type="number" name="price"
                               class="form-control mb-3"
                               value="{{ product.price }}" required>

                        <input type="number" name="quantity"
                               class="form-control mb-3"
                               value="{{ product.quantity }}" required>

                        <textarea name="description"
                                  class="form-control mb-3"
                                  required>{{ product.description }}</textarea>

                        <input type="file" name="image"
                               class="form-control mb-3">

                        <button type="submit" class="primary-btn w-100">
                            Update Product
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
