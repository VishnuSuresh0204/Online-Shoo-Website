{% extends 'USER/commen.html' %}
{% block content %}

<section class="banner-area organic-breadcrumb">
    <div class="container">
        <h1>Report Seller</h1>
    </div>
</section>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow p-4">
                <h3 class="mb-4">Report: {{ seller.username }}</h3>

                <form method="post">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" name="subject" class="form-control" required
                            placeholder="e.g. Fraud, Bad Product">
                    </div>

                    <div class="form-group">
                        <label>Complaint Details</label>
                        <textarea name="complaint" class="form-control" rows="5" required
                            placeholder="Describe your issue..."></textarea>
                    </div>

                    <button type="submit" class="primary-btn w-100">Submit Report</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
