{% extends 'USER/commen.html' %}
{% block content %}

<section class="banner-area organic-breadcrumb">
    <div class="container">
        <div class="breadcrumb-banner d-flex flex-wrap align-items-center justify-content-end">
            <div class="col-first">
                <h1>Rate Product</h1>
                <nav class="d-flex align-items-center">
                    <a href="/user_home">Home<span class="lnr lnr-arrow-right"></span></a>
                    <a href="#">Feedback</a>
                </nav>
            </div>
        </div>
    </div>
</section>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="login_form_inner">
                <h3>Review {{ product.product_name }}</h3>
                <form class="row login_form" action="" method="post" id="contactForm" novalidate="novalidate">
                    {% csrf_token %}
                    <div class="col-md-12 form-group">
                        <select name="rating" class="form-control">
                            <option value="5">5 - Excellent</option>
                            <option value="4">4 - Good</option>
                            <option value="3">3 - Average</option>
                            <option value="2">2 - Poor</option>
                            <option value="1">1 - Terrible</option>
                        </select>
                    </div>
                    <div class="col-md-12 form-group">
                        <textarea class="form-control" name="comment" id="message" rows="1" placeholder="Your review"
                            required></textarea>
                    </div>
                    <div class="col-md-12 form-group">
                        <button type="submit" value="submit" class="primary-btn">Submit Review</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
